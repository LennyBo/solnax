<div class="cooldown-card" [class.active]="active()">
  <div class="status">
    <span class="indicator"></span>
    <span class="label">
      {{ active() ? 'Manual Cooldown Active' : 'No Manual Cooldown' }}
    </span>
  </div>

  <div class="actions">
    <button
      class="btn primary"
      (click)="createCoolDown()"
      [disabled]="active() || loading()">
      Activate
    </button>

    <button
      class="btn danger"
      (click)="clearCoolDown()"
      [disabled]="loading()">
      Clear
    </button>
  </div>
</div>

<!-- Active Cooldowns Details -->
<div class="cooldown-details" *ngIf="cooldowns().length > 0">
  <h4>Active Cooldowns</h4>
  <div class="cooldown-item" *ngFor="let cd of cooldowns()">
    <span class="cd-target">{{ cd.target }}</span>
    <span class="cd-reason">{{ formatReason(cd.reason) }}</span>
    <span class="cd-remaining">{{ cd.minutesRemaining }} min left</span>
  </div>
</div>

<!-- Toast -->
<div class="toast" *ngIf="toast()" [class]="toast()?.type">
  {{ toast()?.message }}
</div>
